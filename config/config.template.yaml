# mihomo config for proxy-pool
# Managed by proxy_pool — DO NOT edit directly

mixed-port: 7892
ipv6: true
udp: true
allow-lan: true
bind-address: '*'
mode: global
log-level: info
unified-delay: true

dns:
  enable: true
  listen: '0.0.0.0:1055'
  ipv6: false
  default-nameserver:
    - 114.114.114.114
    - 223.5.5.5
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  nameserver:
    - 'https://223.5.5.5/dns-query'
    - 'https://doh.pub/dns-query'
  fallback:
    - 'https://223.5.5.5/dns-query'
    - 'https://doh.pub/dns-query'

# Placeholder — replaced at runtime with inline proxies from subscription
proxies: []

proxy-groups:
  - name: ProxyPool
    type: select
    proxies:
      - DIRECT
  - name: GLOBAL
    type: select
    proxies:
      - ProxyPool
      - DIRECT

rules: []
